<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern To-Do List</title>
    <meta name="description" content="A beautiful and functional to-do list application.">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-container">
        <header class="header">
            <h1>Tasks</h1>
            <p class="subtitle">Organize your day beautifully.</p>
        </header>

        <main>
            <form id="todo-form" class=" input-group">
                <input type="text" id="todo-input" placeholder="What needs to be done?" autocomplete="off" required>
                <button type="submit" id="add-btn" aria-label="Add task">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                </button>
            </form>

            <div class="filters">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="active">Active</button>
                <button class="filter-btn" data-filter="completed">Completed</button>
            </div>

            <div class="todo-list-container">
                <ul id="todo-list" class="todo-list">
                    <!-- Tasks will be injected here via JavaScript -->
                </ul>

                <div id="empty-state" class="empty-state hidden">
                    <div class="empty-icon">✨</div>
                    <p>You're all caught up!</p>
                </div>
            </div>
        </main>

        <footer class="footer">
            <span id="items-left">0 items left</span>
            <button id="clear-completed" class="clear-btn">Clear completed</button>
        </footer>
    </div>

    <!-- Custom JS -->
    <script src="script.js"></script>
</body>

</html>
